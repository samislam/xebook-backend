$kind: http-request
url: "{{mainApi}}/v1/auth/login"
method: POST
body:
  type: json
  content: |-
    {
        "username": "root",
        "password": "root"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 200) {
          const response = pm.response.json();
          
          pm.collectionVariables.set("access_token", response.accessToken);
      }
    language: text/javascript
order: 1000
